<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uy-bot 官方網站</title>
    <style>
        /* 基本樣式 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            color: #fff; 
            margin: 0; 
            background-color: #313338; /* Discord 暗色背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .hero {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #5865F2; /* Discord 招牌藍 */
        }
        p.subtitle {
            font-size: 1.2rem;
            color: #B5BAC1;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary {
            background-color: #5865F2;
            color: white;
        }
        .btn-primary:hover {
            background-color: #4752C4;
        }
        .btn-outline {
            border: 1px solid #4E5058;
            color: white;
        }
        .btn-outline:hover {
            background-color: #4E5058;
        }
        /* 法律連結區域 */
        .legal-links {
            margin-top: 50px;
            font-size: 0.9rem;
        }
        .legal-links a {
            color: #949BA4;
            text-decoration: none;
            margin: 0 10px;
        }
        .legal-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Uy-bot</h1>
        <p class="subtitle">
            強大的伺服器管理、Minecraft 查詢與自動化功能，<br>
            為您的 Discord 社群注入全新活力。
        </p>
        
        <div class="btn-group">
            <a href="你的邀請連結" class="btn btn-primary" target="_blank">邀請機器人</a>
            <a href="#features" class="btn btn-outline">功能介紹</a>
        </div>
    </div>

    <div class="legal-links">
        <a href="tos.html">服務條款</a>
        <a href="privacy.html">隱私權政策</a>
    </div>

</body>
</html>
